<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Lisa</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,300;0,400;0,500;1,300&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0d0f14;
    --bg-panel: #111318;
    --bg-input: #161820;
    --bg-msg-ai: #13151c;
    --border: #1f2230;
    --border-hi: #2a2e42;
    --accent: #7c6af7;
    --accent-dim: #4a4399;
    --accent-glow: #7c6af755;
    --text: #d8dae8;
    --text-dim: #5a5e78;
    --text-muted: #383b52;
    --user-color: #e8d9ff;
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'IBM Plex Sans', sans-serif;
    --radius: 6px;
    --transition: 0.18s ease;
  }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--sans); font-size: 15px; line-height: 1.6; overflow: hidden; }
  #app { display: flex; flex-direction: column; height: 100vh; max-width: 860px; margin: 0 auto; }
  header { display: flex; align-items: center; justify-content: space-between; padding: 14px 24px; border-bottom: 1px solid var(--border); background: var(--bg-panel); flex-shrink: 0; user-select: none; }
  .header-left { display: flex; align-items: center; gap: 12px; }
  .avatar { width: 34px; height: 34px; border-radius: 50%; background: linear-gradient(135deg, var(--accent-dim) 0%, var(--accent) 100%); display: flex; align-items: center; justify-content: center; font-family: var(--mono); font-size: 13px; font-weight: 500; color: #fff; flex-shrink: 0; position: relative; }
  .avatar::after { content: ''; position: absolute; bottom: 1px; right: 1px; width: 8px; height: 8px; border-radius: 50%; background: #4ade80; border: 2px solid var(--bg-panel); }
  .header-name { font-family: var(--mono); font-size: 15px; font-weight: 500; color: var(--text); letter-spacing: 0.02em; }
  .header-sub { font-family: var(--mono); font-size: 10px; color: var(--text-dim); letter-spacing: 0.06em; text-transform: uppercase; margin-top: 1px; }
  .logout-btn { font-family: var(--mono); font-size: 11px; color: var(--text-muted); text-decoration: none; letter-spacing: 0.05em; padding: 4px 8px; border-radius: var(--radius); transition: color var(--transition), background var(--transition); }
  .logout-btn:hover { color: var(--text-dim); background: var(--border); }
  #messages { flex: 1; overflow-y: auto; padding: 20px 24px; display: flex; flex-direction: column; gap: 4px; scroll-behavior: smooth; }
  #messages::-webkit-scrollbar { width: 4px; }
  #messages::-webkit-scrollbar-thumb { background: var(--border-hi); border-radius: 2px; }
  .msg { display: flex; flex-direction: column; max-width: 78%; animation: fadeUp 0.2s ease forwards; opacity: 0; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  .msg.user { align-self: flex-end; }
  .msg.ai { align-self: flex-start; }
  .msg-meta { font-family: var(--mono); font-size: 10px; color: var(--text-muted); letter-spacing: 0.04em; margin-bottom: 4px; padding: 0 2px; }
  .msg.user .msg-meta { text-align: right; }
  .msg-bubble { padding: 10px 14px; border-radius: var(--radius); line-height: 1.65; word-break: break-word; white-space: pre-wrap; }
  .msg.user .msg-bubble { background: #1e1b38; border: 1px solid #2e2858; color: var(--user-color); }
  .msg.ai .msg-bubble { background: var(--bg-msg-ai); border: 1px solid var(--border); color: var(--text); }
  .cursor { display: inline-block; width: 2px; height: 1em; background: var(--accent); margin-left: 2px; vertical-align: text-bottom; animation: blink 0.8s step-end infinite; }
  @keyframes blink { 50% { opacity: 0; } }
  #empty-state { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; color: var(--text-muted); font-family: var(--mono); font-size: 12px; letter-spacing: 0.05em; text-align: center; pointer-events: none; }
  .empty-glyph { font-size: 32px; margin-bottom: 6px; opacity: 0.3; }
  #input-area { padding: 16px 24px 20px; border-top: 1px solid var(--border); background: var(--bg-panel); flex-shrink: 0; }
  #input-wrap { display: flex; align-items: flex-end; gap: 10px; background: var(--bg-input); border: 1px solid var(--border-hi); border-radius: 10px; padding: 10px 12px; transition: border-color var(--transition), box-shadow var(--transition); }
  #input-wrap:focus-within { border-color: var(--accent-dim); box-shadow: 0 0 0 3px var(--accent-glow); }
  #msg-input { flex: 1; background: transparent; border: none; outline: none; color: var(--text); font-family: var(--sans); font-size: 15px; line-height: 1.5; resize: none; min-height: 24px; max-height: 200px; overflow-y: auto; padding: 0; }
  #msg-input::placeholder { color: var(--text-muted); }
  #send-btn { flex-shrink: 0; width: 34px; height: 34px; border-radius: 8px; border: none; background: var(--accent); color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background var(--transition), transform 0.1s ease, opacity var(--transition); }
  #send-btn:hover:not(:disabled) { background: #9585fa; }
  #send-btn:active:not(:disabled) { transform: scale(0.93); }
  #send-btn:disabled { opacity: 0.35; cursor: not-allowed; }
  #send-btn svg { width: 16px; height: 16px; }
  .input-hint { font-family: var(--mono); font-size: 10px; color: var(--text-muted); margin-top: 8px; letter-spacing: 0.04em; text-align: center; }
  #login-overlay { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 100; padding: 20px; }
  .login-box { width: 100%; max-width: 360px; background: var(--bg-panel); border: 1px solid var(--border-hi); border-radius: 12px; padding: 40px 36px; display: flex; flex-direction: column; gap: 24px; animation: fadeUp 0.3s ease forwards; }
  .login-header { text-align: center; }
  .login-avatar { width: 56px; height: 56px; border-radius: 50%; background: linear-gradient(135deg, var(--accent-dim), var(--accent)); display: flex; align-items: center; justify-content: center; font-family: var(--mono); font-size: 20px; color: #fff; margin: 0 auto 16px; box-shadow: 0 0 30px var(--accent-glow); }
  .login-title { font-family: var(--mono); font-size: 20px; font-weight: 500; color: var(--text); letter-spacing: 0.02em; }
  .login-sub { font-size: 13px; color: var(--text-dim); margin-top: 6px; }
  .login-field { display: flex; flex-direction: column; gap: 8px; }
  .login-field label { font-family: var(--mono); font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-dim); }
  .login-field input { background: var(--bg-input); border: 1px solid var(--border-hi); border-radius: var(--radius); padding: 10px 14px; color: var(--text); font-family: var(--mono); font-size: 14px; outline: none; transition: border-color var(--transition), box-shadow var(--transition); }
  .login-field input:focus { border-color: var(--accent-dim); box-shadow: 0 0 0 3px var(--accent-glow); }
  #login-error { font-family: var(--mono); font-size: 12px; color: #f87171; min-height: 16px; letter-spacing: 0.03em; }
  #login-btn { background: var(--accent); border: none; border-radius: var(--radius); color: #fff; font-family: var(--mono); font-size: 13px; font-weight: 500; letter-spacing: 0.05em; padding: 12px; cursor: pointer; transition: background var(--transition), transform 0.1s ease; text-transform: uppercase; }
  #login-btn:hover { background: #9585fa; }
  #login-btn:active { transform: scale(0.98); }
  @media (max-width: 600px) { header { padding: 12px 16px; } #messages { padding: 16px; } #input-area { padding: 12px 16px 16px; } .msg { max-width: 92%; } }
</style>
</head>
<body>

{% if login_mode is defined and login_mode %}
<div id="login-overlay">
  <div class="login-box">
    <div class="login-header">
      <div class="login-avatar">L</div>
      <div class="login-title">Lisa</div>
      <div class="login-sub">Enter password to continue</div>
    </div>
    <div class="login-field">
      <label>Password</label>
      <input type="password" id="pw-input" placeholder="••••••••" autocomplete="current-password" />
    </div>
    <div id="login-error"></div>
    <button id="login-btn">Enter</button>
  </div>
</div>
{% endif %}

<div id="app">
  <header>
    <div class="header-left">
      <div class="avatar">L</div>
      <div>
        <div class="header-name">Lisa</div>
        <div class="header-sub">AI Companion · Local</div>
      </div>
    </div>
    <a href="/logout" class="logout-btn">logout</a>
  </header>

  <div id="messages">
    <div id="empty-state">
      <div class="empty-glyph">◈</div>
      <div>Start a conversation</div>
    </div>
  </div>

  <div id="input-area">
    <div id="input-wrap">
      <textarea id="msg-input" rows="1" placeholder="Write a message..." autocomplete="off" spellcheck="true"></textarea>
      <button id="send-btn" title="Send (Enter)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </button>
    </div>
    <div class="input-hint">Enter — send · Shift+Enter — new line</div>
  </div>
</div>

<script>
let isStreaming = false;
const messagesEl = document.getElementById('messages');
const inputEl = document.getElementById('msg-input');
const sendBtn = document.getElementById('send-btn');
const emptyState = document.getElementById('empty-state');

function now() { return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }); }
function removeEmpty() { if (emptyState) emptyState.remove(); }
function scrollToBottom() { messagesEl.scrollTop = messagesEl.scrollHeight; }
function autoResize() { inputEl.style.height = 'auto'; inputEl.style.height = Math.min(inputEl.scrollHeight, 200) + 'px'; }
function setStreaming(val) { isStreaming = val; sendBtn.disabled = val; inputEl.disabled = val; }

function addMessage(role, text) {
  removeEmpty();
  const wrap = document.createElement('div');
  wrap.className = `msg ${role}`;
  const meta = document.createElement('div');
  meta.className = 'msg-meta';
  meta.textContent = role === 'user' ? `You · ${now()}` : `Lisa · ${now()}`;
  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  bubble.textContent = text;
  wrap.appendChild(meta);
  wrap.appendChild(bubble);
  messagesEl.appendChild(wrap);
  scrollToBottom();
  return bubble;
}

async function sendMessage() {
  const text = inputEl.value.trim();
  if (!text || isStreaming) return;
  addMessage('user', text);
  inputEl.value = '';
  autoResize();
  setStreaming(true);
  const aiBubble = addMessage('ai', '');
  const cursor = document.createElement('span');
  cursor.className = 'cursor';
  aiBubble.appendChild(cursor);
  try {
    const resp = await fetch('/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text }),
    });
    if (!resp.ok) { aiBubble.textContent = '⚠️ Server error: ' + resp.status; return; }
    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';
    let content = '';
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop();
      for (const line of lines) {
        const trimmed = line.trim();
        if (!trimmed.startsWith('data: ')) continue;
        const payload = trimmed.slice(6);
        if (payload === '[DONE]') { cursor.remove(); continue; }
        const chunk = payload.replace(/\\n/g, '\n');
        content += chunk;
        aiBubble.textContent = content;
        aiBubble.appendChild(cursor);
        scrollToBottom();
      }
    }
    cursor.remove();
    if (!content) aiBubble.textContent = '…';
  } catch (err) {
    cursor.remove();
    aiBubble.textContent = '⚠️ Connection error: ' + err.message;
  } finally {
    setStreaming(false);
    inputEl.focus();
  }
}

sendBtn.addEventListener('click', sendMessage);
inputEl.addEventListener('keydown', (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } });
inputEl.addEventListener('input', autoResize);

const loginBtn = document.getElementById('login-btn');
const pwInput = document.getElementById('pw-input');
const loginErr = document.getElementById('login-error');

if (loginBtn) {
  async function doLogin() {
    const pw = pwInput.value;
    loginErr.textContent = '';
    loginBtn.textContent = '…';
    loginBtn.disabled = true;
    try {
      const r = await fetch('/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password: pw }),
      });
      const data = await r.json();
      if (data.ok) { window.location.href = '/'; }
      else { loginErr.textContent = data.error || 'Wrong password'; pwInput.focus(); pwInput.select(); }
    } catch (e) {
      loginErr.textContent = 'Network error';
    } finally {
      loginBtn.textContent = 'Enter';
      loginBtn.disabled = false;
    }
  }
  loginBtn.addEventListener('click', doLogin);
  pwInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') doLogin(); });
  setTimeout(() => pwInput.focus(), 100);
}

if (!document.getElementById('login-overlay')) inputEl.focus();
</script>
</body>
      </html>
